name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Check Rust formatting
        run: cargo fmt --check

      - name: Run Rust tests
        run: cargo test

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            frontend/packages/milestone-escrow/package-lock.json

      - name: Install generated binding dependencies
        run: npm ci --prefix frontend/packages/milestone-escrow

      - name: Build generated bindings
        run: npm run build --prefix frontend/packages/milestone-escrow

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Lint frontend
        run: npm run lint --prefix frontend

      - name: Test frontend
        run: npm run test --prefix frontend

      - name: Build frontend
        run: npm run build:app --prefix frontend
